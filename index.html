<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tech Radar</title>
  <link rel="stylesheet" href="tech-radar.css" />
  <script src="lib/d3.v7.9.0.min.js"></script>
  <script src="tech-radar.js"></script>
</head>

<body>
  <header class="app-header">
    <div id="title-container">
      <h1 id="title"></h1>
      <div class="title-meta">
        <p id="caption" class="caption"></p>
        <time class="date" id="date"></time>
      </div>
    </div>

    <div class="controls" id="controls" aria-label="Radar controls">
      <div class="control-group">
        <label class="radar-selector-label" for="radar-selector">
          <span class="control-label">Radar</span>
          <select id="radar-selector"></select>
        </label>
      </div>

      <div class="control-group search-group">
        <label class="search-label" for="radar-search">Search</label>
        <div class="search-control">
          <span aria-hidden="true" class="search-icon">⌕</span>
          <input id="radar-search" list="radar-search-options" type="search" placeholder="Find an entry..."
            autocomplete="off" />
          <datalist id="radar-search-options"></datalist>
        </div>
      </div>

      <div class="control-group zoom-controls" aria-label="Zoom controls">
        <span class="control-label">Zoom</span>
        <div id="quadrant-controls" class="quadrant-icon-controls"></div>
      </div>

      <div class="control-group reset-controls" aria-label="Reset controls">
        <button data-zoom="all" class="icon-button reset-button" type="button" title="Reset view" aria-label="Reset view">
          <span aria-hidden="true">↺</span>
        </button>
      </div>

      <div class="control-group appearance-controls" aria-label="Appearance controls">
        <button id="theme-toggle" class="icon-button" type="button" aria-pressed="false" title="Toggle theme"
          aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <main id="radar-layout">
    <section id="radar-wrap">
      <svg id="radar" viewBox="0 0 1000 1000" aria-label="Technology radar"></svg>
    </section>

    <aside id="radar-sidebar">
      <section class="sidebar-panel">
        <header class="sidebar-header">Legend</header>
        <div id="legend"></div>
      </section>

      <details id="guidance-panel">
        <summary>How to Read This Radar</summary>
        <div id="guidance" aria-label="Radar guidance"></div>
      </details>
    </aside>
  </main>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const selector = document.getElementById("radar-selector");

    const displayOptions = {
      sidebar: params.get("sidebar") !== "false",
      guidance: params.get("guidance") !== "false",
      controls: params.get("controls") !== "false",
      title: params.get("title") !== "false",
      theme: params.get("theme") || "system"
    };

    const radarOptions = {
      elements: {
        svgId: "radar",
        legendId: "legend",
        guidanceId: "guidance",
        tooltipId: "tooltip",
        titleId: "title",
        captionId: "caption",
        dateId: "date",
        titleContainerId: "title-container",
        controlsId: "controls",
        mainId: "radar-layout",
        themeToggleId: "theme-toggle",
        quadrantControlsId: "quadrant-controls",
        searchId: "radar-search",
        searchOptionsId: "radar-search-options"
      },
      display: displayOptions
    };

    async function loadRadarRegistry() {
      const response = await fetch("radars/radars.json");

      if (!response.ok) {
        throw new Error("Could not load radar registry.");
      }

      return response.json();
    }

    function getRadarDefinition(registry, id) {
      return registry.radars.find(radar => radar.id === id);
    }

    function buildRadarSelector(registry) {
      selector.innerHTML = "";

      registry.radars.forEach(radar => {
        const option = document.createElement("option");
        option.value = radar.id;
        option.textContent = radar.label;
        selector.appendChild(option);
      });
    }

    async function loadRadar(registry, id) {
      const radarDefinition = getRadarDefinition(registry, id);

      if (!radarDefinition) {
        throw new Error(`Unknown radar: ${id}`);
      }

      const response = await fetch(`radars/${radarDefinition.file}`);

      if (!response.ok) {
        throw new Error(`Could not load radar config: ${id}`);
      }

      const radarData = await response.json();
      new TechRadar(radarData, radarOptions).render();
    }

    async function initialise() {
      const registry = await loadRadarRegistry();

      const requestedRadar = params.get("radar") || registry.default;
      const selectedRadar = getRadarDefinition(registry, requestedRadar)
        ? requestedRadar
        : registry.default;

      buildRadarSelector(registry);
      selector.value = selectedRadar;

      selector.addEventListener("change", event => {
        const url = new URL(window.location.href);
        url.searchParams.set("radar", event.target.value);
        window.location.href = url.toString();
      });

      await loadRadar(registry, selectedRadar);
    }

    initialise().catch(error => {
      console.error(error);
      document.getElementById("legend").textContent =
        "Unable to load radar configuration.";
    });
  </script>
</body>

</html>
