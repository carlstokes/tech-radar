<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tech Radar</title>
  <script>
    (function () {
      const storageKey = "tech-radar-theme";
      const params = new URLSearchParams(window.location.search);
      const requestedTheme = params.get("theme");
      const systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";

      let storedTheme;

      try {
        storedTheme = localStorage.getItem(storageKey);
      } catch {
        storedTheme = undefined;
      }

      const theme = requestedTheme === "light" || requestedTheme === "dark"
        ? requestedTheme
        : storedTheme || systemTheme;

      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    }());
  </script>
  <link rel="stylesheet" href="tech-radar.css" />
  <script src="lib/d3.v7.9.0.min.js"></script>
  <script src="tech-radar.js"></script>
</head>

<body>
  <header class="app-header">
    <div id="title-container">
      <h1 id="title"></h1>
      <div class="title-meta">
        <p id="caption" class="caption"></p>
        <time class="date" id="date"></time>
      </div>
    </div>

    <div class="controls" id="controls" aria-label="Radar controls">
      <div class="control-group">
        <label class="radar-selector-label" for="radar-selector">
          <span class="control-label">Radar</span>
          <select id="radar-selector"></select>
        </label>
      </div>

      <div class="control-group search-group">
        <label class="search-label" for="radar-search">Search</label>
        <div class="search-control">
          <input id="radar-search" list="radar-search-options" type="search" placeholder="Search radar..."
            autocomplete="off" />
          <datalist id="radar-search-options"></datalist>
        </div>
      </div>

      <div class="control-group zoom-controls" aria-label="Zoom controls">
        <span class="control-label">Zoom</span>
        <div id="quadrant-controls" class="quadrant-icon-controls"></div>
      </div>

      <div class="control-group reset-controls" aria-label="Reset controls">
        <button data-zoom="all" class="icon-button reset-button" type="button" title="Reset view" aria-label="Reset view">
          <span aria-hidden="true">↺</span>
        </button>
      </div>

      <div class="control-group appearance-controls" aria-label="Appearance controls">
        <button id="theme-toggle" class="icon-button" type="button" aria-pressed="false" title="Toggle theme"
          aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <main id="radar-layout">
    <section id="radar-wrap">
      <svg id="radar" viewBox="0 0 1000 1000" aria-label="Technology radar"></svg>
    </section>

    <aside id="radar-sidebar">
      <section id="entries-panel" class="sidebar-panel">
        <header class="sidebar-header">Entries</header>
        <div id="legend"></div>
      </section>

      <details id="guidance-panel">
        <summary>How to Read This Radar</summary>
        <div id="guidance" aria-label="Radar guidance"></div>
      </details>
    </aside>
  </main>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const selector = document.getElementById("radar-selector");

    let radarRegistry;
    let currentRadar;
    let activeRadarId;

    const displayOptions = {
      sidebar: params.get("sidebar") !== "false",
      entries: params.get("entries") !== "false",
      guidance: params.get("guidance") !== "false",
      controls: params.get("controls") !== "false",
      title: params.get("title") !== "false",
      radarSelector: params.get("radarSelector") !== "false",
      theme: params.get("theme") || "system"
    };

    const radarOptions = {
      elements: {
        svgId: "radar",
        legendId: "legend",
        guidanceId: "guidance",
        tooltipId: "tooltip",
        titleId: "title",
        captionId: "caption",
        dateId: "date",
        titleContainerId: "title-container",
        controlsId: "controls",
        mainId: "radar-layout",
        themeToggleId: "theme-toggle",
        quadrantControlsId: "quadrant-controls",
        searchId: "radar-search",
        searchOptionsId: "radar-search-options"
      },
      display: displayOptions
    };

    async function loadRadarRegistry() {
      const response = await fetch("radars/radars.json");

      if (!response.ok) {
        throw new Error("Could not load radar registry.");
      }

      return response.json();
    }

    function getRadarDefinition(registry, id) {
      return registry.radars.find(radar => radar.id === id);
    }

    function getSelectedRadarId(registry) {
      const currentParams = new URLSearchParams(window.location.search);
      const requestedRadar = currentParams.get("radar") || registry.default;

      return getRadarDefinition(registry, requestedRadar)
        ? requestedRadar
        : registry.default;
    }

    function buildRadarSelector(registry) {
      selector.innerHTML = "";

      registry.radars.forEach(radar => {
        const option = document.createElement("option");
        option.value = radar.id;
        option.textContent = radar.label;
        selector.appendChild(option);
      });
    }

    async function fetchRadarData(registry, id) {
      const radarDefinition = getRadarDefinition(registry, id);

      if (!radarDefinition) {
        throw new Error(`Unknown radar: ${id}`);
      }

      const response = await fetch(`radars/${radarDefinition.file}`);

      if (!response.ok) {
        throw new Error(`Could not load radar config: ${id}`);
      }

      return response.json();
    }

    async function loadRadar(registry, id) {
      const radarData = await fetchRadarData(registry, id);

      currentRadar?.destroy();
      currentRadar = new TechRadar(radarData, radarOptions).render();
      activeRadarId = id;
      selector.value = id;
    }

    async function switchRadar(id, updateUrl = true) {
      if (!id || id === activeRadarId) return;

      document.body.dataset.radarLoading = "true";
      selector.disabled = true;

      try {
        await loadRadar(radarRegistry, id);

        if (updateUrl) {
          const url = new URL(window.location.href);
          url.searchParams.set("radar", id);
          window.history.pushState({}, "", url);
        }
      } catch (error) {
        console.error(error);
        selector.value = activeRadarId || selector.value;

        if (!currentRadar) {
          document.getElementById("legend").textContent =
            "Unable to load radar configuration.";
        }
      } finally {
        selector.disabled = false;
        delete document.body.dataset.radarLoading;
      }
    }

    async function initialise() {
      radarRegistry = await loadRadarRegistry();
      const selectedRadar = getSelectedRadarId(radarRegistry);

      buildRadarSelector(radarRegistry);
      selector.value = selectedRadar;

      selector.addEventListener("change", event => {
        switchRadar(event.target.value);
      });

      window.addEventListener("popstate", () => {
        switchRadar(getSelectedRadarId(radarRegistry), false);
      });

      await loadRadar(radarRegistry, selectedRadar);
    }

    initialise().catch(error => {
      console.error(error);
      document.getElementById("legend").textContent =
        "Unable to load radar configuration.";
    });
  </script>
</body>

</html>
